<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Vysus Training Platform</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --stockholm-neon: #00E3A9;
            --malmo-green: #005454;
            --barcelona-dusk: #3c1363;
            --orlando-red: #f92d63;
            --trondheim-night: #1d1d1b;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--malmo-green) 0%, var(--trondheim-night) 50%, var(--barcelona-dusk) 100%);
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=1920&q=90') center/cover;
            opacity: 0.3;
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }
        .container { position: relative; z-index: 10; width: 100%; max-width: 440px; padding: 2rem; }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(60px) saturate(180%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            padding: 3rem 2.5rem;
            animation: floatIn 0.8s ease;
        }
        @keyframes floatIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-size: 1.8rem; background: linear-gradient(135deg, var(--stockholm-neon), var(--white)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .logo p { color: rgba(255, 255, 255, 0.7); font-size: 0.95rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: rgba(255, 255, 255, 0.9); font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 1rem 1.2rem; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: white; font-size: 1rem; }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .form-group input:focus { outline: none; border-color: var(--stockholm-neon); box-shadow: 0 0 20px rgba(0, 227, 169, 0.2); }
        .submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--stockholm-neon), var(--malmo-green)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 227, 169, 0.4); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .links { text-align: center; margin-top: 1.5rem; }
        .links a { color: var(--stockholm-neon); text-decoration: none; font-size: 0.9rem; }
        .message { border-radius: 8px; padding: 1rem; font-size: 0.9rem; margin-bottom: 1.5rem; display: none; }
        .message.error { background: rgba(249, 45, 99, 0.2); border: 1px solid var(--orlando-red); color: var(--orlando-red); }
        .message.success { background: rgba(0, 227, 169, 0.2); border: 1px solid var(--stockholm-neon); color: var(--stockholm-neon); }
        .message.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="logo">
                <h1>Forgot Password</h1>
                <p>Enter your email to reset your password</p>
            </div>
            <div id="error-message" class="message error"></div>
            <div id="success-message" class="message success"></div>
            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="name@vysusgroup.com" required autocomplete="email">
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Send Reset Link</button>
            </form>
            <div id="reset-link-panel" style="display:none; margin-top:1.5rem; padding:1rem; border-radius:12px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);">
                <p style="color:rgba(255,255,255,0.75); font-size:0.9rem; margin-bottom:0.8rem;">Email delivery is not configured yet. Use the secure reset link below in this browser session.</p>
                <input id="reset-link" type="text" readonly style="width:100%; padding:0.9rem 1rem; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:white; font-size:0.9rem;">
                <div style="display:flex; gap:0.8rem; margin-top:0.8rem; flex-wrap:wrap;">
                    <button type="button" class="submit-btn" id="open-reset-link" style="margin-top:0; flex:1;">Open Reset Page</button>
                    <button type="button" class="submit-btn" id="copy-reset-link" style="margin-top:0; flex:1; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);">Copy Link</button>
                </div>
            </div>
            <div class="links"><a href="/login">Back to login</a></div>
        </div>
    </div>
    <script src="training-engine.js"></script>
    <script>
        TrainingEngine.init();

        const form = document.getElementById('forgot-form');
        const successMessage = document.getElementById('success-message');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const resetLinkPanel = document.getElementById('reset-link-panel');
        const resetLinkInput = document.getElementById('reset-link');
        const openResetLinkBtn = document.getElementById('open-reset-link');
        const copyResetLinkBtn = document.getElementById('copy-reset-link');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            resetLinkPanel.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const result = await TrainingEngine.Auth.requestPasswordReset(document.getElementById('email').value);
                if (!result.ok) {
                    throw new Error(result.error || 'Failed to create reset link.');
                }

                resetLinkInput.value = result.resetUrl;
                successMessage.textContent = 'Reset link created. Open it now or copy it for later use in this browser.';
                successMessage.classList.add('show');
                resetLinkPanel.style.display = 'block';
                submitBtn.textContent = 'Email Sent';
            } catch (error) {
                errorMessage.textContent = error.message || 'An error occurred. Please try again.';
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });

        openResetLinkBtn.addEventListener('click', () => {
            if (resetLinkInput.value) {
                window.location.href = resetLinkInput.value;
            }
        });

        copyResetLinkBtn.addEventListener('click', async () => {
            if (!resetLinkInput.value) return;
            try {
                await navigator.clipboard.writeText(resetLinkInput.value);
                successMessage.textContent = 'Reset link copied to clipboard.';
                successMessage.classList.add('show');
            } catch {
                errorMessage.textContent = 'Could not copy the reset link automatically.';
                errorMessage.classList.add('show');
            }
        });
    </script>
</body>
</html>
